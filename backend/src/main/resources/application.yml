server:
  port: 8011
spring:
  application:
    name: flashbrain-backend
  config:
    import: optional:classpath:application-dev.yml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/flashbrain?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# OCR 服务配置
ocr:
  baidu:
    apiKey: XXX
    secretKey: XXXX
  server:
    url: http://127.0.0.1:8093/ocr
  timeout:
    connect: 500000
    read: 1500000

security:
  jwt:
    secret: ${JWT_SECRET:flashbrain-development-secret-change-me-flashbrain-development-secret}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
